networks:
  quicksend-network:
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: quicksend-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: quicksend_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - quicksend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: quicksend-redis
    ports:
      - "6379:6379"
    networks:
      - quicksend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: quicksend-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - quicksend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./services/gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - UPLOAD_SERVICE_URL=http://upload-service:3001
      - VIEW_SERVICE_URL=http://view-service:3004
      - QR_SERVICE_URL=http://qr-service:3003
      - LINK_SERVICE_URL=http://link-service:3002
      - FILE_STORAGE_SERVICE_URL=http://file-storage-service:3005
    depends_on:
      link-service:
        condition: service_started
      upload-service:
        condition: service_started
      view-service:
        condition: service_started
      qr-service:
        condition: service_started
    networks:
      - quicksend-network
    restart: unless-stopped

  upload-service:
    build: ./services/upload-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - FILE_STORAGE_SERVICE_URL=http://file-storage-service:3005
      - LINK_SERVICE_URL=http://link-service:3002
      - QR_SERVICE_URL=http://qr-service:3003
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      file-storage-service:
        condition: service_started
    networks:
      - quicksend-network
    restart: unless-stopped

  link-service:
    build: ./services/link-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DATABASE_URL=mysql://root:password@mysql:3306/quicksend_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - quicksend-network
    restart: unless-stopped

  qr-service:
    build: ./services/qr-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - quicksend-network
    restart: unless-stopped

  view-service:
    build: ./services/view-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - LINK_SERVICE_URL=http://link-service:3002
      - FILE_STORAGE_SERVICE_URL=http://file-storage-service:3005
    depends_on:
      link-service:
        condition: service_started
      file-storage-service:
        condition: service_started
    networks:
      - quicksend-network
    restart: unless-stopped

  file-storage-service:
    build: ./services/file-storage-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
    volumes:
      - file-storage:/app/storage
    networks:
      - quicksend-network
    restart: unless-stopped

  work-service:
    build: ./services/work-service
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - LINK_SERVICE_URL=http://link-service:3002
      - FILE_STORAGE_SERVICE_URL=http://file-storage-service:3005
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - quicksend-network
    restart: unless-stopped

volumes:
  mysql-data:
  file-storage:
